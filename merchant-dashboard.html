<!-- seller-dashboard.html --><!DOCTYPE html><html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header>
      <h1>Welcome, Seller!</h1>
      <nav>
        <a href="index.html" class="gradient-btn">Home</a>
        <button onclick="logout()" class="gradient-btn">Logout</button>
      </nav>
    </header>  <main class="auth-container">
      <h2>Manage Your Products</h2>
      <form onsubmit="addProduct(event)">
        <input type="text" id="product-name" placeholder="Product Name" required>
        <input type="text" id="product-price" placeholder="Price" required>
        <input type="text" id="product-desc" placeholder="Description" required>
        <button type="submit" class="gradient-btn">Add Product</button>
      </form><ul id="seller-products"></ul>
  
    </main>  
    <script src="/script.js"></script>
    </body>
    </html>
