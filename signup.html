<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - The Market</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="auth-container">
    <h2 class="auth-title">Sign Up</h2>
    <form onsubmit="handleSignUp(event)">
      <input type="text" id="signup-full-name" placeholder="Full Name" required>
      <input type="text" id="signup-username" placeholder="Username" required>
      <input type="email" id="signup-email" placeholder="Email" required>
      <input type="password" id="signup-password" placeholder="Password" required>
      <button type="submit" class="gradient-btn">Register</button>
    </form>
    <p class="auth-switch">Already have an account? <a href="signin.html">Sign In</a></p>
  </main>

  <script src="/script.js"></script>
</body>
</html>
