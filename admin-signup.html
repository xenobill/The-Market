<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Signup - GlenHub</title>
  <link rel="stylesheet" href="glen.css">
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f7f7f7; margin: 0; }
    .container { max-width: 400px; margin: 60px auto; background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 32px 24px; text-align: center; }
    h1 { color: var(--primary-color); margin-bottom: 18px; }
    input[type="text"], input[type="password"] { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; font-size: 1em; }
    button { background: var(--primary-color); color: #fff; border: none; border-radius: 4px; padding: 10px 24px; font-size: 1.1em; font-weight: bold; cursor: pointer; margin-top: 12px; }
    button:hover { background: var(--primary-color-dark); }
    .error { color: #f44336; margin-top: 10px; }
    .back-link { display: inline-block; margin-top: 24px; color: #2196f3; text-decoration: none; font-weight: bold; }
    .back-link:hover { text-decoration: underline; }
    #dark-mode-toggle { position: absolute; top: 20px; right: 20px; font-size: 24px; cursor: pointer; }
  </style>
</head>
<body>
  <span id="dark-mode-toggle" title="Toggle dark mode">🌙</span>
  <div class="container">
    <h1>Admin Signup</h1>
    <form id="admin-signup-form">
      <input type="text" id="admin-signup-username" placeholder="Username" required />
      <input type="password" id="admin-signup-password" placeholder="Password" required />
      <input type="password" id="admin-signup-password-confirm" placeholder="Confirm Password" required />
      <button type="submit">Sign Up</button>
      <div class="error" id="admin-signup-error"></div>
    </form>
    <a href="admin-login.html" class="back-link">&larr; Back to Admin Login</a>
  </div>
  <script src="main.js"></script>
  <script>
    document.getElementById('admin-signup-form').onsubmit = function(e) {
      e.preventDefault();
      const username = document.getElementById('admin-signup-username').value.trim();
      const password = document.getElementById('admin-signup-password').value;
      const passwordConfirm = document.getElementById('admin-signup-password-confirm').value;
      const errorDiv = document.getElementById('admin-signup-error');
      if (!username || !password || !passwordConfirm) {
        errorDiv.textContent = 'Please fill in all fields.';
        return;
      }
      if (password !== passwordConfirm) {
        errorDiv.textContent = 'Passwords do not match.';
        return;
      }
      // Create admin account server-side
      fetch('/api/signup', {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email: username + '@local', password, role: 'admin' })
      }).then(r => r.json()).then(data => {
        if (data.success) {
          alert('Admin account created! You can now log in.');
          window.location.href = 'admin-login.html';
        } else {
          errorDiv.textContent = data.message || 'Signup failed.';
        }
      }).catch(() => {
        errorDiv.textContent = 'Server error. Please try again.';
      });
    };
  </script>
</body>
</html>
