<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - The Market</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="auth-container">
    <h2 class="auth-title">Sign In</h2>
    <form onsubmit="handleSignIn(event)">
      <input type="text" id="signin-username" placeholder="Username" required>
      <input type="password" id="signin-password" placeholder="Password" required>
      <button type="submit" class="gradient-btn">Login</button>
    </form>
    <p class="auth-switch">Don't have an account? <a href="signup.html">Sign Up</a></p>
  </main>

  <script src="/script.js"></script>
</body>
</html>
