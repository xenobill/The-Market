<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - GlenHub</title>
  <link rel="stylesheet" href="glen.css">
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f7f7f7; margin: 0; }
    .container { max-width: 1100px; margin: 40px auto; background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 32px 24px; }
    h1 { color: var(--primary-color); margin-bottom: 18px; }
    .admin-section { margin-bottom: 32px; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 24px; }
    th, td { padding: 12px 10px; border-bottom: 1px solid #eee; text-align: left; }
    th { background: #f44336; color: #fff; }
    tr:hover { background: #f9f9f9; }
    .action-btn { background: var(--accent-color); color: #fff; border: none; border-radius: 4px; padding: 6px 14px; cursor: pointer; font-weight: bold; margin-right: 6px; }
    .action-btn.danger { background: var(--primary-color); }
    .action-btn:disabled { background: #ccc; cursor: not-allowed; }
    .back-link { display: inline-block; margin-bottom: 18px; color: #2196f3; text-decoration: none; font-weight: bold; }
    .back-link:hover { text-decoration: underline; }
    .admin-header { display: flex; align-items: center; justify-content: space-between; }
    .logout-btn { background: var(--primary-color); color: #fff; border: none; border-radius: 4px; padding: 8px 18px; font-weight: bold; cursor: pointer; }
    .logout-btn:hover { background: var(--primary-color-dark); }
    #dark-mode-toggle { font-size: 24px; cursor: pointer; margin-left: 10px; }
  </style>
</head>
<body>
  <header>
    <div class="admin-header container">
      <h1>Admin Dashboard</h1>
      <div>
        <span id="dark-mode-toggle" title="Toggle dark mode">🌙</span>
        <button class="logout-btn" onclick="adminLogout()">Logout</button>
      </div>
    </div>
  </header>
  <main>
    <div class="container">
      <a href="Index.html" class="back-link">&larr; Back to Home</a>
      <section class="admin-section">
        <h2>All Users</h2>
        <table id="users-table">
          <thead>
            <tr><th>Username</th><th>Email</th><th>Role</th><th>Status</th><th>Actions</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>
      <section class="admin-section">
        <h2>All Products</h2>
        <table id="products-table">
          <thead>
            <tr><th>Name</th><th>Merchant</th><th>Category</th><th>Price</th><th>Status</th><th>Actions</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>
    </div>
  </main>
  <script src="main.js"></script>
  <script src="script.js"></script>
  <script>
    // --- Admin Dashboard Logic ---
    document.addEventListener('DOMContentLoaded', function () {
      // Admin login check
      if (localStorage.getItem('isAdmin') !== 'true') {
        window.location.href = 'admin-login.html';
        return;
      }
      // Load users from server
      const usersTable = document.querySelector('#users-table tbody');
      fetch('/api/users', { credentials: 'same-origin' })
        .then(r => r.json())
        .then(data => {
          if (data.success && Array.isArray(data.users)) {
            usersTable.innerHTML = data.users.map(user => `
              <tr>
                <td>${user.username}</td>
                <td>${user.email}</td>
                <td>${user.role}</td>
                <td>Active</td>
                <td>
                  <button class="action-btn" disabled>Verify</button>
                  <button class="action-btn danger" onclick="deleteUser('${user.username}')">Delete</button>
                </td>
              </tr>
            `).join('');
          } else {
            usersTable.innerHTML = '<tr><td colspan="5">Unable to load users.</td></tr>';
          }
        })
        .catch(() => {
          usersTable.innerHTML = '<tr><td colspan="5">Unable to load users.</td></tr>';
        });
      // Load products
      const productsTable = document.querySelector('#products-table tbody');
      fetch('/products').then(res => res.json()).then(data => {
        if (data.success && Array.isArray(data.products)) {
          productsTable.innerHTML = data.products.map(p => `
            <tr>
              <td>${p.name}</td>
              <td>${p.merchant || 'Unknown'}</td>
              <td>${p.category || ''}</td>
              <td>₦${p.price}</td>
              <td>${p.status || 'Active'}</td>
              <td>
                <button class="action-btn danger" onclick="deleteProduct('${p.name}')">Delete</button>
              </td>
            </tr>
          `).join('');
        }
      });
    });
    // --- Admin Actions ---
    function verifyUser(username) {
      let users = JSON.parse(localStorage.getItem('users')) || [];
      users = users.map(u => u.username === username ? { ...u, verified: true } : u);
      localStorage.setItem('users', JSON.stringify(users));
      alert('User verified!');
      location.reload();
    }
    function deleteUser(username) {
      if (!confirm('Are you sure you want to delete this user?')) return;
      fetch('/api/delete_user', {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username })
      }).then(res => res.json()).then(data => {
        if (data.success) {
          alert('User deleted!');
          location.reload();
        } else {
          alert('Failed to delete user: ' + (data.message || 'Unknown error'));
        }
      }).catch(err => {
        console.error('Delete user error:', err);
        alert('Failed to delete user.');
      });
    }
    function deleteProduct(name) {
      fetch('/api/delete_product', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name })
      }).then(res => res.json()).then(data => {
        if (data.success) {
          alert('Product deleted!');
          location.reload();
        } else {
          alert('Failed to delete product: ' + (data.message || 'Unknown error'));
        }
      });
    }
    function adminLogout() {
      // Optionally clear admin session here
      window.location.href = 'Index.html';
    }
  </script>
</body>
</html>
